<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1341B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0FE;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0A2472" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (very faint) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.04"/>

  <!-- Shield shape -->
  <path d="M512 168 L720 248 L720 520 Q720 680 512 780 Q304 680 304 520 L304 248 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield inner border accent -->
  <path d="M512 198 L696 272 L696 516 Q696 660 512 752 Q328 660 328 516 L328 272 Z"
        fill="none" stroke="#1A56DB" stroke-width="3" opacity="0.15"/>

  <!-- Check mark — bold, green -->
  <path d="M408 510 L476 578 L636 418"
        stroke="#059669" stroke-width="62" stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Euro symbol — small, bottom right of shield -->
  <text x="598" y="660" font-family="Arial, sans-serif" font-size="88"
        font-weight="900" fill="#1A56DB" opacity="0.55" text-anchor="middle">€</text>
</svg>
