name: alloccheck_app
description: "AllocCheck — Vérifie tes droits CAF et conteste si ça colle pas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Supabase (branché plus tard — projet lakxgpzweyevwdfhatvy)
  supabase_flutter: ^2.9.0
  # HTTP
  http: ^1.4.0
  # PDF
  printing: ^5.14.2
  pdf: ^3.11.5
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  # Storage
  shared_preferences: ^2.5.3
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  # Icône source PNG 1024×1024
  image_path: "assets/icon/icon.png"
  # iOS
  ios: true
  remove_alpha_ios: true          # App Store exige une icône sans canal alpha
  # Android
  android: true
  adaptive_icon_background: "#1A56DB"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  # Web
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#1A56DB"
    theme_color: "#1A56DB"
  # Windows / macOS (desktop future)
  windows:
    generate: false
  macos:
    generate: false
