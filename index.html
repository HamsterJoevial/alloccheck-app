<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AllocCheck — Maintenance</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #1d4ed8;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
    }
    .brand {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 16px;
      line-height: 1.3;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 16px;
    }
    p:last-child { margin-bottom: 0; }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }
    .contact {
      font-size: 14px;
      color: var(--muted);
    }
    .contact a {
      color: var(--accent);
      text-decoration: none;
    }
    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="brand">AllocCheck</div>
      <h1>Temporairement indisponible</h1>
      <p>Nous retravaillons notre moteur de calcul pour garantir l'exactitude de vos simulations de droits CAF.</p>
      <p>L'application sera de retour très prochainement.</p>
      <div class="divider"></div>
      <p class="contact">Une question&nbsp;? <a href="mailto:alloccheck@flowforges.fr">alloccheck@flowforges.fr</a></p>
    </div>
  </main>
</body>
</html>
