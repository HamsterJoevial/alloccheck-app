  <!-- Alert card -->
  <rect x="882" y="108" width="196" height="78" rx="10"
        fill="#DC2626" opacity="0.2"/>
  <rect x="882" y="108" width="196" height="78" rx="10"
        fill="none" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>
  <text x="980" y="132" font-family="Arial, sans-serif" font-size="11"
        fill="#FFFFFF" text-anchor="middle" opacity="0.7">Manque à toucher</text>
  <text x="980" y="159" font-family="Arial, sans-serif" font-size="26"
        font-weight="900" fill="#FFFFFF" text-anchor="middle">+127 €/mois</text>
  <text x="980" y="178" font-family="Arial, sans-serif" font-size="10"
        fill="#FFFFFF" text-anchor="middle" opacity="0.6">soit 1 524 €/an non perçus</text>

  <!-- Aid rows -->
  <rect x="882" y="196" width="196" height="34" rx="7" fill="#FFFFFF" opacity="0.08"/>
  <text x="900" y="218" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">RSA</text>
  <text x="1068" y="218" font-family="Arial, sans-serif" font-size="11"
        font-weight="700" fill="#059669" text-anchor="end">+607 €/mois</text>

  <rect x="882" y="236" width="196" height="34" rx="7" fill="#FFFFFF" opacity="0.08"/>
  <text x="900" y="258" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">APL</text>
  <text x="1068" y="258" font-family="Arial, sans-serif" font-size="11"
        font-weight="700" fill="#059669" text-anchor="end">+312 €/mois</text>

  <rect x="882" y="276" width="196" height="34" rx="7" fill="#FFFFFF" opacity="0.08"/>
  <text x="900" y="298" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">Prime d'activité</text>
  <text x="1068" y="298" font-family="Arial, sans-serif" font-size="11"
        font-weight="700" fill="#059669" text-anchor="end">+605 €/mois</text>

  <rect x="882" y="316" width="196" height="34" rx="7" fill="#FFFFFF" opacity="0.08"/>
  <text x="900" y="338" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">Allocations familiales</text>
  <text x="1068" y="338" font-family="Arial, sans-serif" font-size="11"
        font-weight="700" fill="#059669" text-anchor="end">+349 €/mois</text>

  <!-- CTA button -->
  <rect x="882" y="366" width="196" height="40" rx="10" fill="#1A56DB"/>
  <text x="980" y="391" font-family="Arial, sans-serif" font-size="12"
        font-weight="700" fill="#FFFFFF" text-anchor="middle">Débloquer — 0,99 €</text>

  <!-- Disclaimer tiny -->
  <text x="980" y="418" font-family="Arial, sans-serif" font-size="9"
        fill="#FFFFFF" text-anchor="middle" opacity="0.5">Paiement unique · Accès permanent</text>

  <!-- Home indicator -->
  <rect x="940" y="448" width="80" height="4" rx="2" fill="#FFFFFF" opacity="0.25"/>

  <!-- URL bottom -->
  <text x="88" y="600" font-family="Arial, sans-serif"
        font-size="16" fill="#FFFFFF" opacity="0.45">alloccheck.flowforges.fr</text>
</svg>
